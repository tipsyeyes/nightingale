# 设置日志目录、等级、存储周期
logger:
  dir: logs/agent
  level: INFO
  keepHours: 24

enable:
  mon: true     # 是否启用监控告警
  job: true     # 是否启用任务执行
  report: true  #

job:
  metadir: ./meta
  interval: 2

report:
  # 调用ams的接口上报数据，需要ams的token
  token: ams-builtin-token

  # 上报周期，单位是秒
  interval: 10

  # physical：物理机，virtual：虚拟机，container：容器，switch：交换机
  cate: physical

  # 使用哪个字段作为唯一KEY，即作为where条件更新对应记录，一般使用sn或ip
  uniqkey: ip

  # 如果是虚拟机，应该是获取uuid
  # curl -s http://169.254.169.254/a/meta-data/instance-id
  # sn: dmidecode -s system-serial-number | tail -n 1
  sn: echo 8888-8888-8888-8888-8888

  fields:
    # cpu: cat /proc/cpuinfo | grep processor | wc -l
    # mem: cat /proc/meminfo | grep MemTotal | awk '{printf "%dGi", $2/1024/1024}'
    # disk: df -m | grep '/dev/' | grep -v '/var/lib' | grep -v tmpfs | awk '{sum += $2};END{printf "%dGi", sum/1024}'
    cpu: echo 8
    mem: echo 15Gi
    disk: echo 180Gi

# 监控告警配置
# 监控告警默认附带的监控指标每30秒以 rpc的方式发送给transfer
# - sys/func模块下是各种指标的获取方式
# 插件、端口、进程等自定义指标采集上报分别在 sys/plugins、sys/ports、sys/procs目录下
# 插件默认开启从远端获取采集配置
# - 如果从本地加载： 读取./plugin下面格式为 $cycle_$名称 的文件，如 60_myplugin，每60秒exec被系统调用，然后讲stdout序列化成监控指标，传输给transfer
# - 如果从远程加载：系统会间隔从monapi获取最新的 proc、port、log、plugin的监控策略，具体查看 stra包
# 进程采集默认从远程获取采集配置，如果本地目录存在配置文件，就主动覆盖或新增配置
# - 扫描 procPath目录下的文件，格式为：step_method_name（间隔时间_name|cmdline|cmd_名称标识），不要带后缀名
# 端口采集默认从远程获取采集配置，如果本地目录存在配置文件，就主动覆盖或新增配置
# - 扫描 portPath目录下的文件，格式为：step_port（间隔时间_端口），不要带后缀名
sys:
  # timeout in ms
  # interval in second
  timeout: 5000   # 忽略
  interval: 30    # 指标主动上报间隔
  ifacePrefix:
    - eth
    - em
    - ens

  # ignore disk mount point
  # 磁盘统计忽略项
  mountIgnore:
    prefix:
      - /var/lib
      - /run
    # collect anyway
    exclude: []

  # 配置需要忽略的采集指标
  ignoreMetrics:
    - cpu.core.idle
    - cpu.core.util
    - cpu.core.sys
    - cpu.core.user
    - cpu.core.nice
    - cpu.core.guest
    - cpu.core.irq
    - cpu.core.softirq
    - cpu.core.iowait
    - cpu.core.steal

  # 从本地加载插件
  pluginRemote: false

# 扩展监控采集策略
stra:
  enable: true      # 是否启用
  interval: 10      # 更新间隔
  api: /api/mon/collects/       # apimon接口
  procPath: ./etc/proc
  portPath: ./etc/port
  logPath: ./etc/log

